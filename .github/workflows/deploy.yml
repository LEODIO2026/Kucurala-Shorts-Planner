name: Deploy Agent Kura to Cloud Run Job

on:
  push:
    branches:
      - main  # 메인 브랜치에 푸시할 때 배포 수행

env:
  PROJECT_ID: kucurala-shorts-planner-2026
  REGION: us-central1
  REPOSITORY: kucurala-repo
  IMAGE_NAME: kura-producer
  JOB_NAME: kura-daily-mission

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v1
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v1

      - name: Configure Docker
        run: gcloud auth configure-docker us-central1-docker.pkg.dev

      - name: Build and Push Docker Image
        run: |
          docker build -t us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} .
          docker push us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }}

      - name: Deploy Cloud Run Job
        run: |
          gcloud run jobs deploy ${{ env.JOB_NAME }} \
            --image us-central1-docker.pkg.dev/${{ env.PROJECT_ID }}/${{ env.REPOSITORY }}/${{ env.IMAGE_NAME }}:${{ github.sha }} \
            --region ${{ env.REGION }} \
            --set-env-vars NOTION_TOKEN=${{ secrets.NOTION_TOKEN }},NOTION_DATABASE_ID=${{ secrets.NOTION_DATABASE_ID }} \
            --max-retries 3

      - name: Setup Cloud Scheduler
        run: |
          # 기존 트리거가 있으면 삭제 후 재 생성 (또는 업데이트)
          gcloud scheduler jobs create http kura-daily-trigger \
            --schedule="0 0 * * *" \
            --time-zone="Asia/Seoul" \
            --uri="https://${{ env.REGION }}-run.googleapis.com/apis/run.googleapis.com/v1/namespaces/${{ env.PROJECT_ID }}/jobs/${{ env.JOB_NAME }}:run" \
            --http-method=POST \
            --oauth-service-account-email=github-actions-deployer@${{ env.PROJECT_ID }}.iam.gserviceaccount.com \
            --location=${{ env.REGION }} \
            --description="매일 한국 아침 09:00 (KST) 에이전트 쿠라 가동" \
            || gcloud scheduler jobs update http kura-daily-trigger \
            --schedule="0 0 * * *" \
            --time-zone="Asia/Seoul" \
            --location=${{ env.REGION }}
